services:
  db:
    image: postgres:15-alpine
    container_name: minibar-db
    environment:
      POSTGRES_DB: minibar_db
      POSTGRES_USER: minibar
      POSTGRES_PASSWORD: minibar_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minibar -d minibar_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: minibar-api
    environment:
      DATABASE_URL: postgresql://minibar:minibar_pass@db:5432/minibar_db
      PORT: 3000
      NODE_ENV: development
      TZ: Europe/Moscow
      APP_TIMEZONE: Europe/Moscow
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: minibar-web
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data: